    type: decision
    size: medium
    position:
      x: 820
      'y': 980
  - id: design_cfg
    label: |-
      推荐
      平面/UI: 32GB + 1TB SSD
      3D/剪辑: 32~64GB + 中高端独显
    type: document
    size: large
    position:
      x: 1080
      'y': 980
