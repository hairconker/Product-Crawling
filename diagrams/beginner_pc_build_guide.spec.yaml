    size: large
    position:
      x: 2240
      'y': 560
  - id: compatibility
    label: 兼容性通过?
    type: decision
    size: medium
    position:
      x: 2240
      'y': 840
  - id: revise
    label: 返回调整\n接口 供电 尺寸 散热
    type: process
    size: medium
    position:
      x: 2480
      'y': 940
  - id: assemble
    label: 开始装机\n先装 CPU / 散热 / 内存\n再上机箱与走线
    type: process
    size: large
    position:
      x: 2740
      'y': 700
  - id: boot
    label: 一次点亮?
    type: decision
    size: medium
    position:
      x: 3000
      'y': 700
  - id: troubleshoot
    label: 排障\n查供电 插槽 跳线\n显示输出 内存重插
    type: process
    size: medium
    position:
      x: 3240
      'y': 860
  - id: system
    label: 安装系统与驱动
    type: process
    size: medium
    position:
      x: 3240
      'y': 560
  - id: verify
    label: 验收\n温度正常\n硬盘识别\n运行稳定
    type: process
    size: medium
    position:
      x: 3480
      'y': 560
  - id: done
    label: 完成\n进入使用与后续升级
    type: terminal
    size: large
    position:
      x: 3720
      'y': 560
