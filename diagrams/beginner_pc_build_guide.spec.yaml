    label: 是否重负载?
    type: decision
    size: medium
    position:
      x: 820
      'y': 700
  - id: dev_cfg
    label: |-
      推荐
      常规开发: 8 核 + 32GB
      重负载: 8~12 核 + 32~64GB
    type: document
    size: large
    position:
      x: 1080
      'y': 700
  - id: design
    label: 设计\nPS AI PR CAD 3D
    type: process
    size: large
    position:
      x: 520
      'y': 980
