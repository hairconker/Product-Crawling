    size: large
    position:
      x: 820
      'y': 1240
  - id: budget
    label: 确定总预算
    type: decision
    size: large
    position:
      x: 1440
      'y': 700
  - id: budget_rule
    label: 预算取舍\n入门先够用\n主流看平衡\n高配留静音和升级空间
