    label: |-
      推荐
      普通学习: 16GB + 512GB SSD
      专业学习: 6~8 核 + 16~32GB
    type: document
    size: large
    position:
      x: 1080
      'y': 420
  - id: dev
    label: 开发\n前后端 虚拟机 容器
    type: process
    size: large
    position:
      x: 520
      'y': 700
