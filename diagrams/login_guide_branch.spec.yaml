meta:
  profile: engineering-review
  source: generated
  theme: tech-blue
  layout: horizontal
  canvas: 2800x1200
  routing: orthogonal
  title: 四平台登录引导分支图
  description: 基于 登录流程.md 的扫码登录、跳过、超时、手动备选与开始爬取分支。
nodes:
  - id: start
    label: 开始\n四平台登录引导
    type: terminal
    size: large
    position:
      x: 40
      'y': 360
  - id: prep
    label: 首次准备\n检查 pip\n安装 Playwright\n安装 Chromium
    type: process
    size: large
    position:
      x: 240
      'y': 360
  - id: choose_mode
    label: 选择登录模式
    type: decision
    size: large
    position:
      x: 500
      'y': 360
  - id: login_all
    label: 运行\npython scripts\\login_helper.py all
    type: process
    size: large
    position:
      x: 760
      'y': 160
  - id: login_one
    label: 运行单平台\njd / xianyu / taobao
    type: process
    size: large
    position:
      x: 760
      'y': 360
  - id: manual_fallback
    label: 手动备选\n浏览器 F12 复制 Cookie\n写入 state/{platform}_cookie.txt
    type: document
    size: large
    position:
      x: 760
      'y': 640
  - id: browser_step
    label: 浏览器操作\n扫码或输入账号密码完成登录
    type: user
    size: large
    position:
      x: 1040
      'y': 240
  - id: success_detect
    label: 检测到登录 Cookie?
    type: decision
    size: large
    position:
      x: 1300
      'y': 240
  - id: save_state
    label: 自动保存登录态\nstate/*_state.json\nstate/*_cookie.txt
    type: database
    size: large
    position:
      x: 1560
      'y': 120
  - id: timeout
    label: 等待超时\n默认 10 分钟
    type: process
    size: medium
    position:
      x: 1560
      'y': 360
  - id: retry_decision
    label: 继续处理?
    type: decision
    size: medium
    position:
      x: 1820
      'y': 360
  - id: skip_platform
    label: 输入 s 跳过当前平台\n进入下一个平台
    type: process
    size: medium
    position:
      x: 2040
      'y': 500
  - id: crawl
    label: 开始爬取\nrun_cpu_crawl.py\n或 run_cpu_crawl_pw.py --headed
    type: process
    size: large
    position:
      x: 1820
      'y': 120
  - id: slider
    label: 淘宝滑块/验证码?\n手动完成后自动继续
    type: decision
    size: large
    position:
      x: 2080
      'y': 120
  - id: headed_note
    label: 需 headed 模式\n否则无法人工过验
    type: document
    size: medium
    position:
      x: 2340
      'y': 120
  - id: done
    label: 结束\n登录态就绪，可重复复用
    type: terminal
    size: large
    position:
      x: 2600
      'y': 120
edges:
  - from: start
    to: prep
    type: primary
  - from: prep
    to: choose_mode
    type: primary
  - from: choose_mode
    to: login_all
    type: primary
    label: 一次性登录全部
  - from: choose_mode
    to: login_one
    type: primary
    label: 只登录某个平台
  - from: choose_mode
    to: manual_fallback
    type: optional
    label: 不装 Playwright
  - from: login_all
    to: browser_step
    type: primary
    label: 依次弹出平台浏览器
  - from: login_one
    to: browser_step
    type: primary
    label: 打开目标平台
  - from: browser_step
    to: success_detect
    type: primary
    label: 完成扫码/密码登录
  - from: success_detect
    to: save_state
    type: primary
    label: 是
  - from: success_detect
    to: timeout
    type: optional
    label: 否
  - from: timeout
    to: retry_decision
    type: primary
  - from: retry_decision
    to: browser_step
    type: primary
    label: 继续等待/重试
  - from: retry_decision
    to: skip_platform
    type: optional
    label: 跳过
  - from: save_state
    to: crawl
    type: primary
    label: 登录态已就绪
  - from: manual_fallback
    to: crawl
    type: data
    label: 手工 Cookie 已写入
  - from: skip_platform
    to: crawl
    type: optional
    label: 其他平台继续
  - from: crawl
    to: slider
    type: primary
    label: 运行淘宝时检查
  - from: slider
    to: done
    type: primary
    label: 否
  - from: slider
    to: headed_note
    type: optional
    label: 是
  - from: headed_note
    to: done
    type: primary
    label: 过验后继续
modules: []
